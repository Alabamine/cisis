services:
  # === База данных ===
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: cisis
      POSTGRES_USER: cisis_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ChangeMeNow2026!}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cisis_user -d cisis"]
      interval: 5s
      timeout: 3s
      retries: 10
  # === Django (Gunicorn) ===
  web:
    build: .
    restart: always
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=cisis.settings
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-me-in-production}
      - DEBUG=False
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - DB_HOST=db
      - DB_NAME=cisis
      - DB_USER=cisis_user
      - DB_PASSWORD=${DB_PASSWORD:-ChangeMeNow2026!}
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
  # === Nginx (reverse proxy + статика) ===
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - web
volumes:
  pgdata:
  static_files:
  media_files:
